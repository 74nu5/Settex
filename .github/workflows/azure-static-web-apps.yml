name: Deploy docs to Azure Static Web Apps

# Deploys the Blazor WebAssembly documentation site (docs-site/) to Azure
# Static Web Apps.
#
# One-time setup:
#   1. Create an Azure Static Web Apps resource (any region, Free plan is fine).
#      Choose "Other" for the deployment source so no workflow is auto-generated.
#   2. Copy its deployment token and add it to this repository's secrets as
#      AZURE_STATIC_WEB_APPS_API_TOKEN (Settings → Secrets and variables → Actions).
#
# The app is pre-built here (rather than by Azure's Oryx builder) because Oryx
# does not carry the .NET 10 SDK and the wasm-tools workload; the built static
# files are then uploaded.

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/azure-static-web-apps.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
    paths:
      - 'docs-site/**'

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          # Taken from global.json, which pins a GA SDK and sets
          # allowPrerelease: false. Requesting a preview SDK here would no
          # longer satisfy that pin.
          global-json-file: global.json

      - name: Restore workloads
        run: dotnet workload restore docs-site/Settex.Docs.csproj

      - name: Publish Blazor WebAssembly
        run: dotnet publish docs-site/Settex.Docs.csproj -c Release -o publish

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: 'publish/wwwroot'
          skip_app_build: true
          output_location: ''

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close pull request environment
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
